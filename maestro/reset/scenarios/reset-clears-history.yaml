# Scenario: Reset Clears History
# Tests that reset clears the action history

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Make some changes
- tapOn:
    id: "mc_amount_inc_5"
- tapOn:
    id: "steel_amount_inc_5"
- tapOn:
    id: "heat_prod_inc_1"
- waitForAnimationToEnd

# Act - Reset the game
- tapOn:
    id: "reset_button"
- waitForAnimationToEnd

- tapOn:
    id: "reset_confirm_button"
- waitForAnimationToEnd

# Act - Open history
- tapOn:
    id: "history_button"
- waitForAnimationToEnd

# Assert - History should be empty after reset
- assertVisible:
    text: "No actions yet"

# Act - Go back
- back
- waitForAnimationToEnd

# Assert - Main screen visible
- assertVisible:
    id: "generation_display"
