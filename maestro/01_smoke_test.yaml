appId: ${APP_ID}
---
- launchApp
- waitForAnimationToEnd:
    timeout: 3000

# Verify main displays are visible
- assertVisible:
    id: "generation_display"
- assertVisible:
    id: "tr_display"

# Verify control buttons exist
- assertVisible:
    id: "history_button"
- assertVisible:
    id: "undo_button"
- assertVisible:
    id: "redo_button"
- assertVisible:
    id: "reset_button"

# Verify resource card buttons exist (checking for +1 increment buttons)
- assertVisible:
    id: "mc_amount_inc_1"
- assertVisible:
    id: "steel_amount_inc_1"
- assertVisible:
    id: "titanium_amount_inc_1"
- assertVisible:
    id: "plants_amount_inc_1"
- assertVisible:
    id: "energy_amount_inc_1"
- assertVisible:
    id: "heat_amount_inc_1"
