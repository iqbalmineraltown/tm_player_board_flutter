# Scenario: Redo Resource Adjustment
# Tests that redo correctly re-applies undone changes

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Make a change
- tapOn:
    id: "titanium_amount_inc_10"
- waitForAnimationToEnd

# Act - Undo the change
- tapOn:
    id: "undo_button"
- waitForAnimationToEnd

# Act - Redo the change
- tapOn:
    id: "redo_button"
- waitForAnimationToEnd

# Assert - Titanium card still visible
- assertVisible:
    id: "resource_card_titanium"

# Act - Make change, undo, make another change, redo should not work
- tapOn:
    id: "plants_amount_inc_5"
- waitForAnimationToEnd

- tapOn:
    id: "undo_button"
- waitForAnimationToEnd

# Make a new change - this should clear redo stack
- tapOn:
    id: "plants_amount_inc_1"
- waitForAnimationToEnd

# Assert - Plants card visible
- assertVisible:
    id: "resource_card_plants"
