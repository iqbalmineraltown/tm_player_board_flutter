# Scenario: View History
# Tests opening and closing the action history screen

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Tap history button
- tapOn:
    id: "history_button"
- waitForAnimationToEnd

# Assert - History screen appears
- assertVisible:
    text: "Action History"

# Act - Go back to main screen
- back

# Assert - Back on main screen
- assertVisible:
    id: "generation_display"
