# Scenario: Reset Cancel
# Tests that canceling reset does not change game state

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Make some changes first
- tapOn:
    id: "titanium_amount_inc_15"
- tapOn:
    id: "plants_prod_inc_1"
- waitForAnimationToEnd

# Act - Tap reset button
- tapOn:
    id: "reset_button"
- waitForAnimationToEnd

# Assert - Reset confirmation dialog appears
- assertVisible:
    text: "Reset Game?"

# Act - Cancel reset
- tapOn:
    id: "reset_cancel_button"
- waitForAnimationToEnd

# Assert - Dialog dismissed, game state preserved
- assertNotVisible:
    text: "Reset Game?"
- assertVisible:
    id: "resource_card_titanium"
- assertVisible:
    id: "resource_card_plants"
