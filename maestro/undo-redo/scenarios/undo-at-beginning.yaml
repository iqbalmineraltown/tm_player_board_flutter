# Scenario: Undo at Beginning
# Tests that undo at the beginning does nothing (nothing to undo)

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Try to undo without any prior action
- tapOn:
    id: "undo_button"
- waitForAnimationToEnd

# Assert - App still functional, no crash
- assertVisible:
    id: "generation_display"
- assertVisible:
    id: "resource_card_megacredits"

# Act - Make a change then undo it
- tapOn:
    id: "energy_prod_inc_1"
- waitForAnimationToEnd

- tapOn:
    id: "undo_button"
- waitForAnimationToEnd

# Act - Try to undo again (nothing to undo)
- tapOn:
    id: "undo_button"
- waitForAnimationToEnd

# Assert - App still functional
- assertVisible:
    id: "generation_display"
