# Scenario: Redo Without Undo
# Tests that redo without prior undo does nothing

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Make a change (don't undo)
- tapOn:
    id: "heat_amount_inc_5"
- waitForAnimationToEnd

# Act - Try to redo without prior undo
- tapOn:
    id: "redo_button"
- waitForAnimationToEnd

# Assert - App still functional, no crash
- assertVisible:
    id: "generation_display"
- assertVisible:
    id: "resource_card_heat"
