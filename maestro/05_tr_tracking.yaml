appId: com.iqbalmineraltown.tmplayerboard
---
- launchApp
- waitForAnimationToEnd:
    timeout: 3000

# Test TR increment
- tapOn:
    id: "tr_increment"
- waitForAnimationToEnd:
    timeout: 500

# Verify TR display exists (TR should now be 21)
- assertVisible:
    id: "tr_display"

# Increment again
- tapOn:
    id: "tr_increment"
- waitForAnimationToEnd:
    timeout: 500

# Verify TR display still exists (TR should now be 22)
- assertVisible:
    id: "tr_display"

# Test TR decrement
- tapOn:
    id: "tr_decrement"
- waitForAnimationToEnd:
    timeout: 500

# Verify TR display exists (TR should be back to 21)
- assertVisible:
    id: "tr_display"
