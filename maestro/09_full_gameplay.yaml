appId: ${APP_ID}
---
- launchApp
- waitForAnimationToEnd:
    timeout: 3000

# Simulate a full generation gameplay
# Add MC from production
- tapOn:
    id: "mc_amount_inc_10"
- tapOn:
    id: "mc_amount_inc_10"
- tapOn:
    id: "mc_amount_inc_5"
- waitForAnimationToEnd:
    timeout: 500

# Add Steel from production
- tapOn:
    id: "steel_amount_inc_5"
- tapOn:
    id: "steel_amount_inc_5"
- waitForAnimationToEnd:
    timeout: 500

# Add Titanium from production
- tapOn:
    id: "titanium_amount_inc_10"
- waitForAnimationToEnd:
    timeout: 500

# Add Plants
- tapOn:
    id: "plants_amount_inc_1"
- tapOn:
    id: "plants_amount_inc_1"
- tapOn:
    id: "plants_amount_inc_1"
- waitForAnimationToEnd:
    timeout: 500

# Add Energy
- tapOn:
    id: "energy_amount_inc_1"
- tapOn:
    id: "energy_amount_inc_1"
- waitForAnimationToEnd:
    timeout: 500

# Convert Energy to Heat
- tapOn:
    id: "energy_amount_dec_1"
- tapOn:
    id: "energy_amount_dec_1"
- tapOn:
    id: "heat_amount_inc_1"
- tapOn:
    id: "heat_amount_inc_1"
- waitForAnimationToEnd:
    timeout: 500

# Increase production
- tapOn:
    id: "mc_prod_inc_1"
- tapOn:
    id: "steel_prod_inc_1"
- tapOn:
    id: "plants_prod_inc_1"
- waitForAnimationToEnd:
    timeout: 500

# Increase TR
- tapOn:
    id: "tr_increment"
- tapOn:
    id: "tr_increment"
- waitForAnimationToEnd:
    timeout: 500

# Next generation (production phase)
- tapOn:
    id: "generation_increment"
- waitForAnimationToEnd:
    timeout: 500

# Confirm production phase dialog
- tapOn: "Confirm"
- waitForAnimationToEnd:
    timeout: 1000

# Verify generation display exists (should be at 2)
- assertVisible:
    id: "generation_display"

# Open history to see all actions
- tapOn:
    id: "history_button"
- waitForAnimationToEnd:
    timeout: 1000

- assertVisible: "Action History"

# Go back
- pressKey: back
- waitForAnimationToEnd:
    timeout: 500
