# Scenario: Production Phase Cancel
# Tests that canceling production phase does not increment generation

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Tap production phase button
- tapOn:
    id: "generation_increment"
- waitForAnimationToEnd

# Assert - Production phase dialog appears
- assertVisible:
    text: "Production Phase"

# Act - Cancel the dialog
- tapOn:
    text: "Cancel"
- waitForAnimationToEnd

# Assert - Dialog dismissed, generation unchanged
- assertVisible:
    id: "generation_display"
- assertNotVisible:
    text: "Production Phase"
