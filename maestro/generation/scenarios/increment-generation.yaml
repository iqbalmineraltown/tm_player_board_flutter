# Scenario: Increment Generation
# Tests the generation increment via production phase with confirmation

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Assert - Initial generation is 1
- assertVisible:
    id: "generation_display"

# Act - Tap production phase button
- tapOn:
    id: "generation_increment"
- waitForAnimationToEnd

# Assert - Production phase dialog appears
- assertVisible:
    text: "Production Phase"
- assertVisible:
    text: "Advance to next generation:"
- assertVisible:
    text: "Confirm"
- assertVisible:
    text: "Cancel"

# Act - Confirm production phase
- tapOn:
    text: "Confirm"
- waitForAnimationToEnd

# Assert - Generation display still visible (generation should be 2)
- assertVisible:
    id: "generation_display"

# Act - Increment again
- tapOn:
    id: "generation_increment"
- waitForAnimationToEnd

# Assert - Dialog appears again
- assertVisible:
    text: "Production Phase"

# Act - Confirm again
- tapOn:
    text: "Confirm"
- waitForAnimationToEnd

# Assert - Generation display still visible (generation should be 3)
- assertVisible:
    id: "generation_display"
