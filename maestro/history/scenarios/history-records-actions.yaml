# Scenario: History Records Actions
# Tests that actions are recorded in the history

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Perform some actions
- tapOn:
    id: "mc_amount_inc_5"
- waitForAnimationToEnd

- tapOn:
    id: "steel_prod_inc_1"
- waitForAnimationToEnd

- tapOn:
    id: "tr_increment"
- waitForAnimationToEnd

# Act - Open history
- tapOn:
    id: "history_button"
- waitForAnimationToEnd

# Assert - History screen shows actions
- assertVisible:
    text: "Action History"

# Act - Go back
- back
- waitForAnimationToEnd

# Assert - Main screen visible
- assertVisible:
    id: "generation_display"
