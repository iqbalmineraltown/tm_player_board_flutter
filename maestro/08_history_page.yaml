appId: com.iqbalmineraltown.tmplayerboard
---
- launchApp
- waitForAnimationToEnd:
    timeout: 3000

# Make some changes to create history
- tapOn:
    id: "mc_amount_inc_10"
- waitForAnimationToEnd:
    timeout: 500

- tapOn:
    id: "steel_amount_inc_5"
- waitForAnimationToEnd:
    timeout: 500

# Increment generation (production phase)
- tapOn:
    id: "generation_increment"
- waitForAnimationToEnd:
    timeout: 500

# Confirm production phase dialog
- tapOn: "Confirm"
- waitForAnimationToEnd:
    timeout: 1000

# Open history page
- tapOn:
    id: "history_button"
- waitForAnimationToEnd:
    timeout: 1000

# Verify we're on history page
- assertVisible: "Action History"

# Verify entries are visible (using regex for flexibility)
# The description format is "+10 M€" for MC and "+5 STL" for Steel
- assertVisible: ".*\\+10.*"
- assertVisible: ".*\\+5.*"

# Go back using the back button in AppBar (simulated by back key)
- pressKey: back
- waitForAnimationToEnd:
    timeout: 500
