# Scenario: Adjust MC Amount
# Tests incrementing and decrementing Megacredits amount

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Increment MC amount by 1
- tapOn:
    id: "mc_amount_inc_1"
- waitForAnimationToEnd

# Assert - MC amount should increase
- assertVisible:
    id: "resource_card_megacredits"

# Act - Increment MC amount by 5
- tapOn:
    id: "mc_amount_inc_5"
- waitForAnimationToEnd

# Act - Increment MC amount by 10
- tapOn:
    id: "mc_amount_inc_10"
- waitForAnimationToEnd

# Act - Decrement MC amount by 1
- tapOn:
    id: "mc_amount_dec_1"
- waitForAnimationToEnd

# Act - Decrement MC amount by 5
- tapOn:
    id: "mc_amount_dec_5"
- waitForAnimationToEnd

# Assert - MC card still visible and functional
- assertVisible:
    id: "resource_card_megacredits"
