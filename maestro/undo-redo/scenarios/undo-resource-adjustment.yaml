# Scenario: Undo Resource Adjustment
# Tests that undo correctly reverts resource changes

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Increment MC amount
- tapOn:
    id: "mc_amount_inc_10"
- waitForAnimationToEnd

# Act - Undo the change
- tapOn:
    id: "undo_button"
- waitForAnimationToEnd

# Assert - MC card still visible
- assertVisible:
    id: "resource_card_megacredits"

# Act - Make multiple changes and undo
- tapOn:
    id: "steel_amount_inc_5"
- tapOn:
    id: "steel_amount_inc_5"
- waitForAnimationToEnd

- tapOn:
    id: "undo_button"
- waitForAnimationToEnd

# Assert - Steel card still visible
- assertVisible:
    id: "resource_card_steel"
