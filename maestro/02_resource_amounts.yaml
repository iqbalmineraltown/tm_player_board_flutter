appId: com.iqbalmineraltown.tmplayerboard
---
- launchApp
- waitForAnimationToEnd:
    timeout: 3000

# Test MC amount adjustments
# Increment MC by 1
- tapOn:
    id: "mc_amount_inc_1"
- waitForAnimationToEnd:
    timeout: 500

# Increment MC by 5
- tapOn:
    id: "mc_amount_inc_5"
- waitForAnimationToEnd:
    timeout: 500

# Increment MC by 10
- tapOn:
    id: "mc_amount_inc_10"
- waitForAnimationToEnd:
    timeout: 500

# Decrement MC by 1
- tapOn:
    id: "mc_amount_dec_1"
- waitForAnimationToEnd:
    timeout: 500

# Decrement MC by 5
- tapOn:
    id: "mc_amount_dec_5"
- waitForAnimationToEnd:
    timeout: 500

# Test Steel amount adjustments
- tapOn:
    id: "steel_amount_inc_5"
- waitForAnimationToEnd:
    timeout: 500

# Test Titanium amount adjustments
- tapOn:
    id: "titanium_amount_inc_10"
- waitForAnimationToEnd:
    timeout: 500

# Test Plants amount adjustments
- tapOn:
    id: "plants_amount_inc_1"
- waitForAnimationToEnd:
    timeout: 500

# Test Energy amount adjustments
- tapOn:
    id: "energy_amount_dec_1"
- waitForAnimationToEnd:
    timeout: 500

# Test Heat amount adjustments
- tapOn:
    id: "heat_amount_inc_5"
- waitForAnimationToEnd:
    timeout: 500
