# Scenario: Adjust Steel Production
# Tests incrementing and decrementing Steel production

appId: com.example.tm_player_board_flutter
---
# Arrange
- runFlow: ../shared/flows/launch-app.yaml

# Act - Increment Steel production by 1
- tapOn:
    id: "steel_prod_inc_1"
- waitForAnimationToEnd

# Assert - Steel card visible
- assertVisible:
    id: "resource_card_steel"

# Act - Increment Steel production by 5
- tapOn:
    id: "steel_prod_inc_5"
- waitForAnimationToEnd

# Act - Increment Steel production by 10
- tapOn:
    id: "steel_prod_inc_10"
- waitForAnimationToEnd

# Act - Decrement Steel production by 1
- tapOn:
    id: "steel_prod_dec_1"
- waitForAnimationToEnd

# Act - Decrement Steel production by 5
- tapOn:
    id: "steel_prod_dec_5"
- waitForAnimationToEnd

# Assert - Steel card still visible and functional
- assertVisible:
    id: "resource_card_steel"
